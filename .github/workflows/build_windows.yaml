name: Build Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache'
          build-cache: true

      - name: Setup MSVC Dev Cmd (v142)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.29

      - name: Print MSVC Environment
        shell: pwsh
        run: |
          Write-Host "Toolset: 14.29"
          $clCmd = Get-Command cl -ErrorAction Stop
          Write-Host "cl path: $($clCmd.Source)"
          $clVersion = (& cl /? 2>&1 | Select-String -Pattern "Compiler Version" | Select-Object -First 1)
          if ($clVersion) { Write-Host "cl version: $($clVersion.Line.Trim())" }
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $installPath = & $vswhere -latest -products * -property installationPath
            if ($installPath) {
              $msvcRoot = Join-Path $installPath "VC\Tools\MSVC"
              if (Test-Path $msvcRoot) {
                Get-ChildItem -Path $msvcRoot -Directory | Sort-Object Name | ForEach-Object { Write-Host "MSVC dir: $($_.Name)" }
              }
            }
          }

      - name: Configure
        run: xmake f -m release -p windows -a x64 --vs=2022 --vs_toolset=14.29 --vasset_build_examples=y --vasset_build_tests=y --VFileSystem_build_examples=n --VBase_build_examples=n --policies=build.ccache:y -y

      - name: Build
        shell: pwsh
        run: xmake repo -u && xmake -vD -y

      - name: Show install error log
        if: failure()
        shell: bash
        run: |
          find /c/Users/runneradmin/.xmake/cache -name install.txt -exec echo "==== {} ====" \; -exec cat {} \;
